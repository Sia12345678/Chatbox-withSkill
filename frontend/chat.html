<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2a2a2a;
    --text: #e8e8e4;
    --text-muted: #666660;
    --text-dim: #444440;
    --accent: #c8f080;
    --accent-dim: rgba(200, 240, 128, 0.12);
    --user-bg: #1e1e1e;
    --radius: 12px;
    --font-mono: 'DM Mono', monospace;
    --font-sans: 'DM Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* Layout */
  .layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 760px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  .header-title {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-status {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* Skill indicator */
  .skill-indicator {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 20px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.05em;
    animation: fadeIn 0.3s ease;
  }

  .skill-indicator.active {
    display: flex;
  }

  .skill-indicator::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-align: center;
    padding: 60px 0;
  }

  .empty-state-icon {
    width: 40px;
    height: 40px;
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }

  .empty-state-icon svg {
    opacity: 0.3;
  }

  /* Message bubbles */
  .message {
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message-role {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0 4px;
  }

  .message.user .message-role { color: var(--accent); opacity: 0.7; }

  .message-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 14.5px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .message-body {
    background: var(--user-bg);
    border-color: #2e2e2e;
  }

  .message.assistant .message-body {
    border-color: #252525;
  }

  /* Thinking section */
  .thinking-section {
    margin-top: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .thinking-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface2);
    cursor: pointer;
    transition: background 0.15s;
  }

  .thinking-header:hover {
    background: var(--surface);
  }

  .thinking-title {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .thinking-count {
    background: var(--accent-dim);
    color: var(--accent);
    padding: 2px 6px;
    border-radius: 10px;
    font-size: 9px;
  }

  .thinking-toggle {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }

  .thinking-section.expanded .thinking-toggle {
    transform: rotate(180deg);
  }

  .thinking-content {
    display: none;
    padding: 12px 14px;
    background: var(--surface);
    max-height: 300px;
    overflow-y: auto;
  }

  .thinking-section.expanded .thinking-content {
    display: block;
  }

  .thinking-step {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .thinking-step:last-child {
    border-bottom: none;
  }

  .thinking-step-header {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .thinking-step-content {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    background: var(--bg);
    padding: 8px 10px;
    border-radius: 6px;
    overflow-x: auto;
  }

  /* Typing indicator */
  .typing-indicator .message-body {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 16px 18px;
  }

  .typing-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: typing 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
    30% { opacity: 1; transform: scale(1.3); }
  }

  /* Input area */
  .input-area {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px 10px 16px;
    transition: border-color 0.15s;
  }

  .input-wrapper:focus-within {
    border-color: #3a3a3a;
  }

  #message-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14.5px;
    line-height: 1.6;
    resize: none;
    max-height: 160px;
    min-height: 24px;
  }

  #message-input::placeholder { color: var(--text-dim); }

  #send-btn {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #0f0f0f;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
    align-self: flex-end;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.94); }
  #send-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

  .input-hint {
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="layout">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo-dot"></div>
      <span class="header-title">Assistant</span>
    </div>
    <div class="header-right">
      <div class="skill-indicator" id="skill-indicator">
        web-crawler active
      </div>
      <span class="header-status" id="status-label">ready</span>
    </div>
  </header>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2C5.58 2 2 5.58 2 10s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8zm0 3.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm0 9c-2 0-3.77-1.02-4.8-2.57.02-1.6 3.2-2.48 4.8-2.48 1.59 0 4.78.88 4.8 2.48C13.77 13.48 12 14.5 10 14.5z" fill="currentColor"/>
        </svg>
      </div>
      <span>start a conversation</span>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="message-input"
        placeholder="Type a message..."
        rows="1"
        autofocus
      ></textarea>
      <button id="send-btn" title="Send">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1L7 13M7 1L2 6M7 1L12 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">enter to send &nbsp;·&nbsp; shift+enter for newline</div>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('message-input');
  const sendBtn    = document.getElementById('send-btn');
  const statusEl   = document.getElementById('status-label');
  const skillEl    = document.getElementById('skill-indicator');
  const emptyState = document.getElementById('empty-state');

  let isLoading = false;
  let currentAssistantMsg = null;
  let currentThinkingSection = null;

  // Auto-resize textarea as user types
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  // Send on Enter, newline on Shift+Enter
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function addMessage(role, content) {
    // Remove empty state on first message
    if (emptyState) emptyState.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    msg.innerHTML = `
      <div class="message-role">${role === 'user' ? 'you' : 'assistant'}</div>
      <div class="message-body">${escapeHtml(content)}</div>
    `;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function createStreamingMessage() {
    if (emptyState) emptyState.remove();

    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.innerHTML = `
      <div class="message-role">assistant</div>
      <div class="message-body"></div>
    `;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function addThinkingSection(parentMsg, thinkingSteps) {
    const thinkingSection = document.createElement('div');
    thinkingSection.className = 'thinking-section';
    thinkingSection.innerHTML = `
      <div class="thinking-header">
        <span class="thinking-title">
          thinking process
          <span class="thinking-count">${thinkingSteps.length} steps</span>
        </span>
        <span class="thinking-toggle">▼</span>
      </div>
      <div class="thinking-content">
        ${thinkingSteps.map(step => `
          <div class="thinking-step">
            <div class="thinking-step-header">
              ${step.type === 'tool_call' ? '🔧' : '📄'} ${step.name}
            </div>
            ${step.args ? `<div class="thinking-step-content">${escapeHtml(JSON.stringify(step.args, null, 2))}</div>` : ''}
            ${step.content ? `<div class="thinking-step-content">${escapeHtml(step.content)}</div>` : ''}
          </div>
        `).join('')}
      </div>
    `;

    // Toggle functionality
    const header = thinkingSection.querySelector('.thinking-header');
    header.addEventListener('click', () => {
      thinkingSection.classList.toggle('expanded');
    });

    parentMsg.appendChild(thinkingSection);
    return thinkingSection;
  }

  function addTypingIndicator() {
    if (emptyState) emptyState.remove();
    const msg = document.createElement('div');
    msg.className = 'message assistant typing-indicator';
    msg.id = 'typing';
    msg.innerHTML = `
      <div class="message-role">assistant</div>
      <div class="message-body">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTypingIndicator() {
    const typing = document.getElementById('typing');
    if (typing) typing.remove();
  }

  function setLoading(loading) {
    isLoading = loading;
    sendBtn.disabled = loading;
    inputEl.disabled = loading;
    statusEl.textContent = loading ? 'thinking...' : 'ready';
  }

  function showSkillIndicator(skillName) {
    skillEl.textContent = skillName ? `${skillName} active` : 'skill active';
    skillEl.classList.add('active');
  }

  function hideSkillIndicator() {
    skillEl.classList.remove('active');
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    // Clear input
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Show user message
    addMessage('user', text);
    addTypingIndicator();
    setLoading(true);

    // Reset state
    currentAssistantMsg = null;
    currentThinkingSection = null;
    hideSkillIndicator();

    try {
      // Use streaming endpoint
      const response = await fetch('/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.detail || 'Request failed');
      }

      removeTypingIndicator();

      // Create streaming message container
      currentAssistantMsg = createStreamingMessage();
      const messageBody = currentAssistantMsg.querySelector('.message-body');

      // Parse SSE stream
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let thinkingSteps = [];

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // Keep incomplete line in buffer

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          if (line.startsWith('event: ')) {
            const eventType = line.slice(7);
            const dataLine = lines[++i];
            if (dataLine && dataLine.startsWith('data: ')) {
              const data = JSON.parse(dataLine.slice(6));

              switch (eventType) {
                case 'thinking_start':
                  statusEl.textContent = 'analyzing...';
                  break;

                case 'thinking':
                  thinkingSteps.push(data);
                  break;

                case 'skill_used':
                  if (data.skill_used) {
                    showSkillIndicator(data.skill_name);
                  }
                  break;

                case 'token':
                  messageBody.textContent += data.content;
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                  break;

                case 'thinking_complete':
                  if (thinkingSteps.length > 0) {
                    addThinkingSection(currentAssistantMsg, thinkingSteps);
                  }
                  break;

                case 'done':
                  statusEl.textContent = 'ready';
                  break;

                case 'error':
                  throw new Error(data.detail);
              }
            }
          }
        }
      }

    } catch (err) {
      removeTypingIndicator();
      if (currentAssistantMsg) {
        currentAssistantMsg.remove();
      }
      addMessage('assistant', `Error: ${err.message}`);
      hideSkillIndicator();
    } finally {
      setLoading(false);
      inputEl.focus();
    }
  }

  function escapeHtml(text) {
    if (!text) return '';
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
