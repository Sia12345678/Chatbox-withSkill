services:
  - type: web
    name: chatbox
    runtime: python
    plan: standard
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com/v1
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true
